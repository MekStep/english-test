<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Level Test</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <!-- START SCREEN -->
    <div id="start-screen">
      <h1>English Level Test</h1>
      <p class="subtitle">Ստուգիր քո մակարդակը 2 րոպեում</p>
      <button id="start-btn">Սկսել</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quiz-screen" style="display:none;">
      <div id="progress-container">
        <div id="progress-bar"></div>
      </div>

      <p id="progress"></p>

      <h3 id="section-title"></h3>
      <h2 id="question"></h2>

      <div id="text-block"></div>
      <div id="answers"></div>

      <div id="navigation-buttons">
        <button id="back-btn">Հետ</button>
        <button id="next-btn">Հաջորդ</button>
      </div>
    </div>

    <!-- RESULT SCREEN -->
    <div id="result-screen" style="display:none;">
      <div id="score"></div>
      <div id="mistakes"></div>
      <button id="restart-btn">Կրկնել</button>
    </div>

  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
